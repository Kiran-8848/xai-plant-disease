project:
  name: "XAI Plant Disease Classification"
  version: "1.0.0"

data:
  root: "./data/PlantVillage"
  image_size: 224
  batch_size: 32
  num_workers: 0
  train_split: 0.70
  val_split: 0.15
  test_split: 0.15
  augmentation:
    rotation: 30
    horizontal_flip: true
    vertical_flip: false
    zoom: 0.2
    brightness: 0.2

model:
  architecture: "resnet18"
  pretrained: true
  num_classes: 16       # PlantVillage has 15 classes
  dropout: 0.3
  freeze_layers: 6       # Freeze first N layers during initial training

training:
  epochs: 30
  learning_rate: 0.001
  weight_decay: 0.0001
  scheduler: "cosine"    # cosine | step | plateau
  early_stopping_patience: 7
  save_dir: "./backend/ml/checkpoints"
  log_dir: "./backend/ml/logs"

xai:
  gradcam:
    target_layer: "layer4"     # Last conv layer in ResNet18
    output_dir: "./outputs/gradcam"
  lime:
    num_samples: 1000
    num_features: 10
    output_dir: "./outputs/lime"
  shap:
    background_samples: 100
    output_dir: "./outputs/shap"

evaluation:
  faithfulness:
    percentages: [0.05, 0.10, 0.20, 0.30, 0.50]  # % of pixels removed
    method: "blur"           # blur | zero | mean
  robustness:
    noise_levels: [0.01, 0.05, 0.10, 0.20]
    blur_levels: [1, 3, 5]
    brightness_levels: [0.5, 0.8, 1.2, 1.5]
    num_repetitions: 5
  output_dir: "./outputs/evaluation"

api:
  host: "0.0.0.0"
  port: 8000
  cors_origins:
    - "http://localhost:3000"
    - "http://localhost:5173"
  upload_dir: "./outputs/uploads"
  max_file_size_mb: 10
